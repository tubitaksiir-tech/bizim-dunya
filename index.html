<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonsuz Aşkımız | Nazlı & Alperen</title>
    
    <!-- Lüks Fontlar ve İkonlar -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Gerçek Harita Motoru (Leaflet) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --primary: #ff0055;
            --primary-glow: #ff3366;
            --secondary: #ffb3c6;
            --bg-dark: #05000a;
            --glass-bg: rgba(30, 0, 15, 0.4);
            --glass-border: rgba(255, 0, 85, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        body, html { width: 100%; height: 100%; overflow: hidden; background: var(--bg-dark); font-family: 'Montserrat', sans-serif; color: #fff; }

        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: radial-gradient(circle at center, #240016 0%, #05000a 100%); pointer-events: none; }

        /* GİRİŞ OYUNU */
        #intro-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; transition: opacity 1s ease; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #game-screen, #finale-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #finale-screen { display: none; z-index: 12; }
        
        .glass-box { width: 90%; max-width: 480px; background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 40px; padding: 50px 30px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 0 30px rgba(255, 0, 85, 0.15); z-index: 11; }
        .title { font-family: 'Dancing Script', cursive; font-size: 3.5rem; background: linear-gradient(45deg, #ff0055, #ff99cc, #ff0055); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 15px; animation: shine 3s linear infinite; filter: drop-shadow(0 0 10px rgba(255,0,85,0.6)); }
        @keyframes shine { to { background-position: 200% center; } }
        
        .subtitle { font-size: 1.1rem; color: var(--secondary); margin-bottom: 50px; line-height: 1.5; min-height: 50px;}

        .path-wrapper { position: relative; width: 100%; height: 80px; margin-bottom: 60px; }
        .path-line { position: absolute; bottom: 20px; left: 0; width: 100%; height: 4px; background: rgba(255, 255, 255, 0.1); border-radius: 4px; }
        .path-fill { position: absolute; bottom: 20px; left: 0; width: 0%; height: 4px; background: linear-gradient(90deg, var(--primary), var(--secondary)); box-shadow: 0 0 20px var(--primary); transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .path-dots { position: absolute; bottom: 18px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 10%; z-index: 2; }
        .dot { width: 8px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 50%; transition: 0.4s; }
        .dot.active { background: #fff; box-shadow: 0 0 15px #ff3366, 0 0 30px #ff3366; transform: scale(1.5); }
        
        .avatar { position: absolute; bottom: 20px; width: 65px; height: 65px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transition: left 0.5s ease-out, right 0.5s ease-out, transform 0.3s; animation: floatAv 3s ease-in-out infinite; }
        @keyframes floatAv { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        #nazli { left: 0%; transform: translateX(-50%); z-index: 4;} 
        #alperen { right: 0%; transform: translateX(50%); animation-delay: 1.5s; z-index: 3;}
        #hug { display: none; left: 50%; transform: translateX(-50%) scale(0); font-size: 4.5rem; position: absolute; bottom: 5px; transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 5;}
        
        .btn { background: linear-gradient(45deg, var(--primary), #ff4d79); border: none; padding: 18px 40px; font-size: 1.1rem; font-weight: 600; color: white; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 30px rgba(255,0,85,0.5); width: 80%; max-width: 300px; outline: none; font-family: 'Montserrat'; transition: 0.2s;}
        .btn:active { transform: scale(0.95); }

        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 1.5s ease; }
        .neon-heart { position: relative; width: 100px; height: 100px; margin-bottom: 40px; animation: heartbeat 1.5s infinite; }
        .neon-heart::before, .neon-heart::after { content: ''; position: absolute; top: 0; width: 50px; height: 80px; border-radius: 50px 50px 0 0; background: var(--primary); box-shadow: 0 0 50px var(--primary); }
        .neon-heart::before { left: 50px; transform: rotate(-45deg); transform-origin: 0 100%; } .neon-heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 15%, 45% { transform: scale(1.15); filter: drop-shadow(0 0 30px var(--primary)); } 30% { transform: scale(1); } }
        
        .typewriter-text { font-size: 1.15rem; line-height: 1.8; color: #fff0f3; min-height: 150px; max-width: 600px; text-align: center; padding: 0 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        #go-app-btn { display: none; opacity: 0; margin-top: 40px; background: rgba(255,255,255,0.05); border: 1px solid var(--primary); color: #fff; padding: 15px 35px; border-radius: 30px; font-family: 'Montserrat'; font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: all 0.5s; box-shadow: 0 0 20px rgba(255,0,85,0.2); pointer-events: auto; }
        #go-app-btn:hover { background: var(--primary); box-shadow: 0 0 40px var(--primary); transform: translateY(-3px); }

        /* ANA UYGULAMA PANELİ */
        #app-dashboard { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; display: none; opacity: 0; flex-direction: column; background: transparent; transition: opacity 1s ease; }
        .app-container { display: flex; flex-direction: column; height: 100%; width: 100%; max-width: 900px; margin: 0 auto; background: rgba(0,0,0,0.3); box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; overflow: hidden; }

        header { padding: 10px 15px; text-align: center; background: rgba(15,0,10,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); z-index: 100; box-shadow: 0 5px 30px rgba(0,0,0,0.5); }
        header h1 { font-family: 'Dancing Script', cursive; font-size: 1.8rem; background: linear-gradient(45deg, #ff0055, #ff99cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin:0; filter: drop-shadow(0 0 8px rgba(255,0,85,0.4));}

        .timer-wrapper { padding: 10px 15px; text-align: center; background: linear-gradient(to bottom, rgba(255,0,85,0.08), transparent); border-bottom: 1px solid var(--glass-border); z-index: 10;}
        .timer-title { font-size: 0.8rem; color: #ffccd5; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 600; display:flex; justify-content:center; align-items:center; gap:8px;}
        .timer-grid { display: flex; justify-content: center; gap: 8px; max-width: 500px; margin: 0 auto;}
        .t-box { flex:1; background: linear-gradient(135deg, rgba(255,0,85,0.1), rgba(0,0,0,0.6)); border: 1px solid rgba(255,0,85,0.3); border-radius: 12px; padding: 8px 2px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); backdrop-filter: blur(5px); }
        .t-num { font-size: 1.4rem; font-weight: 700; color: #fff; text-shadow: 0 0 15px var(--primary); font-variant-numeric: tabular-nums; }
        .t-lbl { font-size: 0.6rem; color: #ffb3c6; margin-top: 2px; text-transform:uppercase; letter-spacing:1px; font-weight: 600;}

        .content-area { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .tab-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; padding: 15px; overflow-y: auto; }
        #tab-map { overflow: hidden; padding-bottom: 10px; display: none; flex-direction: column; }
        #tab-map.active { display: flex !important; animation: slideIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .tab-panel.active { display: block; animation: slideIn 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

        .section-header { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .section-header h2 { font-size: 1.15rem; font-weight: 600; display: flex; align-items: center; gap: 8px; color: #fff;}
        .section-header h2 i { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
        .add-action-btn { background: linear-gradient(45deg, rgba(255,0,85,0.2), transparent); border: 1px solid var(--primary); color: #fff; padding: 6px 14px; border-radius: 12px; font-size: 0.85rem; cursor: pointer; transition: 0.3s; font-weight:600; box-shadow: 0 0 10px rgba(255,0,85,0.2);}
        .add-action-btn:active { background: var(--primary); box-shadow: 0 0 20px var(--primary); }

        /* =========================================
           İLLÜSTRASYON TARZI RENKLİ VE CANLI HARİTA
           ========================================= */
        #map-container { 
            flex: 1; 
            width: 100%; 
            height: auto; 
            min-height: 0; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 2px solid rgba(255, 0, 85, 0.4); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(255,0,85,0.15); 
            z-index: 1;
            background: #eef2e6;
        }
        
        /* Harita Fayanlarına İllüstrasyon / Çizgi Roman Doygunluk Filtresi */
        .leaflet-tile {
            filter: saturate(2.2) contrast(1.15) brightness(1.02);
        }
        
        .custom-pin { background: #fff; border: 3px solid var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: pulsePin 1.5s infinite; cursor: pointer; }
        @keyframes pulsePin { 0% { box-shadow: 0 0 0 0 rgba(255,0,85,0.9); } 70% { box-shadow: 0 0 0 12px rgba(255,0,85,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,85,0); } }
        
        /* ÇOK DAHA ZARİF VE İNCE NEON ROTA ÇİZGİSİ */
        .neon-route-thin { 
            stroke-dasharray: 6 10; 
            animation: dashAnim 20s linear infinite; 
            filter: drop-shadow(0 0 3px #ff0055); 
        }
        @keyframes dashAnim { to { stroke-dashoffset: -500; } }

        /* Üstüne Basınca Çıkan Şık Baloncuk (Tooltip) */
        .custom-tooltip { background: rgba(20,0,10,0.9); border: 1px solid var(--primary); border-radius: 8px; color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 0.75rem; box-shadow: 0 4px 15px rgba(255,0,85,0.4); padding: 6px 12px; }
        .leaflet-tooltip-top:before { border-top-color: rgba(20,0,10,0.9); }
        .leaflet-popup-content-wrapper, .leaflet-popup-tip { background: rgba(255,255,255,0.95); border: 1px solid var(--primary); color: #333; backdrop-filter: blur(10px); text-align: center; border-radius: 12px;}

        /* Veri Kartları ve Düzenle/Sil */
        .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding-bottom: 20px; }
        @media(min-width: 600px) { .data-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); } .t-num { font-size: 1.8rem; } }
        
        .data-card { background: linear-gradient(135deg, rgba(20,0,10,0.8), rgba(40,0,20,0.8)); border: 1px solid rgba(255, 0, 85, 0.2); border-radius: 15px; overflow: hidden; position: relative; transition: 0.3s; backdrop-filter:blur(10px); box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        .data-card img { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .no-img { width: 100%; height: 180px; display:flex; justify-content:center; align-items:center; background: rgba(255,0,85,0.05); color: var(--primary); font-size: 3rem; text-shadow: 0 0 20px var(--primary);}
        .card-body { padding: 12px; }
        .card-title { font-size: 0.95rem; font-weight: 600; color: #fff; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 40px;}
        .card-desc { font-size: 0.8rem; color: #aaa; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .card-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 6px; z-index: 5; }
        .action-icon { background: rgba(0,0,0,0.7); color: #fff; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px);}
        .action-icon.edit:hover { background: #00ccff; border-color: #00ccff; transform: scale(1.1); }
        .action-icon.delete:hover { background: #ff0055; border-color: #ff0055; transform: scale(1.1); }

        .note-card { grid-column: 1 / -1; display:flex; gap:15px; background: linear-gradient(135deg, rgba(255,0,85,0.15), rgba(0,0,0,0.7)); padding:15px; border-left: 4px solid var(--primary);}
        .note-card .card-actions { top: 15px; right: 15px; }
        .note-card img { width: 80px; height: 80px; border-radius: 10px; border:none;}
        .note-card .no-img { width: 80px; height: 80px; font-size: 2rem; border-radius: 10px;}
        .empty-text { grid-column: 1 / -1; text-align: center; padding: 40px 20px; color: #888; font-style: italic; font-size: 0.95rem; }

        nav { flex-shrink: 0; display: flex; justify-content: space-around; background: rgba(10,0,5,0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--glass-border); padding: 10px 0; padding-bottom: max(10px, env(safe-area-inset-bottom)); z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.5);}
        .nav-btn { color: #666; font-size: 1.2rem; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px; width: 33%; }
        .nav-btn span { font-size: 0.7rem; font-weight: 500; }
        .nav-btn.active { color: #fff; filter: drop-shadow(0 0 8px var(--primary)); transform: translateY(-3px); }
        .nav-btn.active i { background: linear-gradient(45deg, #ff0055, #ff99cc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* MODAL */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 1000; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s; }
        .modal-content { background: #11000a; border: 1px solid var(--primary); border-radius: 25px; width: 90%; max-width: 400px; padding: 25px; box-shadow: 0 0 50px rgba(255,0,85,0.4); transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .modal-content.show { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; color: var(--secondary); font-size: 1.2rem; font-weight: 600; border-bottom: 1px solid var(--glass-border); padding-bottom: 10px; }
        .close-btn { color: #888; font-size: 1.5rem; cursor: pointer; transition: 0.2s; } .close-btn:hover { color: #fff; }
        .input-group { margin-bottom: 15px; } .input-group label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
        .input-group input, .input-group textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 12px; border-radius: 10px; color: #fff; font-family: 'Montserrat'; outline: none; transition: 0.3s; }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary); background: rgba(255,0,85,0.1); }
        .upload-area { border: 2px dashed rgba(255,0,85,0.5); padding: 15px; text-align: center; border-radius: 10px; cursor: pointer; color: var(--secondary); transition: 0.3s; font-size: 0.85rem; background: rgba(255,0,85,0.05);}
        .upload-area:hover { background: rgba(255,0,85,0.15); border-color: var(--primary); }
        .upload-area i { font-size: 1.8rem; margin-bottom: 8px; display: block; color: var(--primary);}
        #file-input { display: none; }
        .save-btn { width: 100%; padding: 12px; background: linear-gradient(45deg, var(--primary), #ff4d79); color: #fff; border: none; border-radius: 10px; font-size: 1.05rem; font-weight: 600; cursor: pointer; margin-top: 5px; box-shadow: 0 5px 20px rgba(255,0,85,0.4); font-family: 'Montserrat';}
        .save-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    
    <!-- 1. GİRİŞ OYUNU -->
    <div id="intro-wrapper">
        <div id="game-screen">
            <div class="glass-box">
                <h1 class="title">Bana Doğru Gel...</h1>
                <div class="subtitle" id="game-sub">Sana kavuşmam için dokun sevgilim...</div>
                <div class="path-wrapper">
                    <div class="path-line"></div>
                    <div class="path-dots">
                        <div class="dot" id="dot-1"></div><div class="dot" id="dot-2"></div><div class="dot" id="dot-3"></div><div class="dot" id="dot-4"></div><div class="dot" id="dot-5"></div>
                    </div>
                    <div class="path-fill" id="path-fill"></div>
                    <div id="nazli" class="avatar">👸🏻</div><div id="alperen" class="avatar">🤴🏻</div><div id="hug">👩🏻‍❤️‍👨🏻</div>
                </div>
                <button class="btn" id="game-btn">İlk Adım ✨</button>
            </div>
        </div>
        <div id="flash"></div>
        <div id="finale-screen">
            <div class="neon-heart"></div>
            <h1 class="title" style="font-size: 4rem; text-shadow: 0 0 20px #ff0055; margin-bottom: 20px;" id="couple-name">Nazlı & Alperen</h1>
            <div class="typewriter-text" id="typewriter"></div>
            <button id="go-app-btn">Bizim Paneline Gitmek İçin Tıkla ❤️</button>
        </div>
    </div>

    <!-- 2. ANA UYGULAMA PANELİ -->
    <div id="app-dashboard">
        <div class="app-container">
            <header>
                <h1>Bizim Dünyamız</h1>
            </header>

            <div class="timer-wrapper">
                <div class="timer-title"><i class="fas fa-infinity" style="font-size:1.1rem;"></i> Seninle Geçen Zamanımız</div>
                <div class="timer-grid">
                    <div class="t-box"><div class="t-num" id="t-d">0</div><div class="t-lbl">Gün</div></div>
                    <div class="t-box"><div class="t-num" id="t-h">00</div><div class="t-lbl">Saat</div></div>
                    <div class="t-box"><div class="t-num" id="t-m">00</div><div class="t-lbl">Dakika</div></div>
                    <div class="t-box"><div class="t-num" id="t-s">00</div><div class="t-lbl">Saniye</div></div>
                </div>
            </div>

            <div class="content-area">
                <!-- HARİTA -->
                <div id="tab-map" class="tab-panel active">
                    <div class="section-header">
                        <h2><i class="fas fa-map-marked-alt"></i> Gittiğimiz Yerler</h2>
                        <div class="add-action-btn" onclick="openModal('map')"><i class="fas fa-plus"></i> Yer Ekle</div>
                    </div>
                    <div id="map-container"></div>
                </div>

                <!-- FİLMLER -->
                <div id="tab-movies" class="tab-panel">
                    <div class="section-header">
                        <h2><i class="fas fa-film"></i> İzlediğimiz Filmler</h2>
                        <div class="add-action-btn" onclick="openModal('movie')"><i class="fas fa-plus"></i> Film Ekle</div>
                    </div>
                    <div class="data-grid" id="movie-grid"></div>
                </div>

                <!-- ANILAR -->
                <div id="tab-notes" class="tab-panel">
                    <div class="section-header">
                        <h2><i class="fas fa-book-heart"></i> Anılarımız</h2>
                        <div class="add-action-btn" onclick="openModal('note')"><i class="fas fa-plus"></i> Anı Ekle</div>
                    </div>
                    <div class="data-grid" id="note-grid"></div>
                </div>
            </div>

            <nav>
                <div class="nav-btn active" onclick="switchTab('map', this)"><i class="fas fa-map-location-dot"></i><span>Haritamız</span></div>
                <div class="nav-btn" onclick="switchTab('movies', this)"><i class="fas fa-popcorn"></i><span>Filmler</span></div>
                <div class="nav-btn" onclick="switchTab('notes', this)"><i class="fas fa-camera-retro"></i><span>Anılar</span></div>
            </nav>
        </div>
    </div>

    <!-- 3. MODAL -->
    <div id="modal-overlay">
        <div class="modal-content" id="modal-box">
            <div class="modal-header">
                <span id="modal-title"><i class="fas fa-plus"></i> Yeni Ekle</span>
                <span class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></span>
            </div>
            <input type="hidden" id="modal-type">
            <div class="input-group">
                <label id="lbl-title">Başlık</label>
                <input type="text" id="inp-title" placeholder="Buraya yazın..." autocomplete="off">
            </div>
            <div class="input-group" id="grp-desc">
                <label id="lbl-desc">Açıklama / Puan</label>
                <textarea id="inp-desc" rows="3" placeholder="İçinden geçenleri yaz..."></textarea>
            </div>
            <div class="input-group" id="grp-img">
                <label>Fotoğraf / Afiş</label>
                <label class="upload-area">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span id="upload-txt">Galeriden Seç</span>
                    <input type="file" id="file-input" accept="image/*">
                </label>
            </div>
            <button class="save-btn" onclick="saveData()">Kaydet</button>
        </div>
    </div>

    <script>
        // Uzay Efekti
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        function initCanvas() {
            width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; particles = [];
            for(let i=0; i<100; i++) particles.push({ x: Math.random()*width, y: Math.random()*height, r: Math.random()*2+0.5, vy: -(Math.random()*0.4+0.1), alpha: Math.random() });
        }
        function drawCanvas() {
            ctx.clearRect(0,0,width,height);
            particles.forEach(p => {
                p.y += p.vy; if(p.y < 0) p.y = height; p.alpha += (Math.random()-0.5)*0.04;
                if(p.alpha<0.1) p.alpha=0.1; if(p.alpha>1) p.alpha=1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fillStyle=`rgba(255,179,198,${p.alpha})`; ctx.fill();
            }); requestAnimationFrame(drawCanvas);
        }
        window.addEventListener('resize', initCanvas); initCanvas(); drawCanvas();

        // Oyun ve Mektup
        let step = 0; const totalSteps = 6;
        const gBtn = document.getElementById('game-btn'), nazli = document.getElementById('nazli'), alperen = document.getElementById('alperen'), hug = document.getElementById('hug'), pathFill = document.getElementById('path-fill'), sub = document.getElementById('game-sub');
        const btnTxts = ["İlk Adım ✨", "Biraz Daha 🌸", "Hızlanıyoruz 💖", "Çok Az Kaldı 🥺", "Son Bir Adım! ❤️"];
        const msgs = ["Biraz daha...", "Kalbim hızlanıyor...", "Sana geliyorum...", "Sımsıkı sarılmaya ramak kala...", "Sonunda kollarındayım!"];

        gBtn.addEventListener('click', () => {
            if(step >= totalSteps) return; step++;
            pathFill.style.width = (step/totalSteps)*100 + '%'; nazli.style.left = (step/totalSteps)*48 + '%'; alperen.style.right = (step/totalSteps)*48 + '%';
            if(step <= 5) { document.getElementById('dot-'+step).classList.add('active'); sub.innerText = msgs[step-1]; }
            if(step < 5) gBtn.innerText = btnTxts[step];
            nazli.style.transform = `translateX(-50%) translateY(-20px) scale(1.1)`; alperen.style.transform = `translateX(50%) translateY(-20px) scale(1.1)`;
            setTimeout(() => { nazli.style.transform = `translateX(-50%) translateY(0) scale(1)`; alperen.style.transform = `translateX(50%) translateY(0) scale(1)`; }, 300);

            if(step === totalSteps) {
                gBtn.style.opacity = 0; sub.style.color = "var(--primary)";
                setTimeout(() => {
                    nazli.style.display='none'; alperen.style.display='none'; hug.style.display='block';
                    setTimeout(() => hug.style.transform='translateX(-50%) scale(1.4)', 50);
                    setTimeout(() => { document.getElementById('flash').style.opacity=1; setTimeout(() => { document.getElementById('game-screen').style.display='none'; document.getElementById('finale-screen').style.display='flex'; document.getElementById('flash').style.opacity=0; setTimeout(startTypewriter, 1000); }, 1000); }, 1200);
                }, 500);
            }
        });

        const letter = "Benim canım sevgilim, güzel prensesim Nazlı'm...^Bu gördüğün sadece bir oyun değil, bizim sonsuz dijital dünyamızın kapısı.^Seninle geçtiğimiz yollar, izlediğimiz filmler, anılarımız... Hepsi burada sonsuza dek kalacak.^Bizim aşkımız hiç bitmeyecek, saniyeler hiç durmayacak...^^~ Alperen ~";
        let cIdx = 0; const twBox = document.getElementById('typewriter');
        function startTypewriter() {
            if(cIdx < letter.length) { twBox.innerHTML += (letter.charAt(cIdx)==='^') ? '<br>' : letter.charAt(cIdx); cIdx++; setTimeout(startTypewriter, (letter.charAt(cIdx)==='.'||letter.charAt(cIdx)===',') ? 350 : 45); } 
            else { setTimeout(() => { const goBtn = document.getElementById('go-app-btn'); goBtn.style.display='inline-block'; setTimeout(() => goBtn.style.opacity=1, 50); }, 1000); }
        }

        document.getElementById('go-app-btn').addEventListener('click', () => {
            document.getElementById('flash').style.opacity = 1;
            setTimeout(() => { document.getElementById('intro-wrapper').style.display='none'; const app = document.getElementById('app-dashboard'); app.style.display='flex'; initAppSystem(); setTimeout(() => { document.getElementById('flash').style.opacity=0; app.style.opacity=1; if(mapInstance) mapInstance.invalidateSize(); }, 500); }, 1000);
        });

        // Veritabanı ve Sayaç
        let loveDB = { movies: [], notes: [], places: [] };
        let mapInstance = null; let routeLayers = null; let mapMarkers = L.layerGroup(); let isDrawingMap = false;

        const defaultPlaces = [
            { name: "Pırlanta Plajı", lat: 38.3150, lng: 26.2290 }, { name: "Altınkum Plajı", lat: 38.2676, lng: 26.2731 },
            { name: "Dharma Beach Club", lat: 38.2750, lng: 26.2900 }, { name: "Çiftlikköy", lat: 38.2850, lng: 26.2950 },
            { name: "Boyalık Halk Plajı", lat: 38.3235, lng: 26.3364 }, { name: "Kocakarı Plajı", lat: 38.3444, lng: 26.3130 },
            { name: "Çeşme Dodo Beach", lat: 38.3450, lng: 26.3600 }, { name: "Ardıç Plajı", lat: 38.3300, lng: 26.4000 },
            { name: "Çark Plajı", lat: 38.2500, lng: 26.3860 }, { name: "Delikli Koy", lat: 38.2380, lng: 26.3770 }
        ];

        function initAppSystem() {
            const savedDB = localStorage.getItem('NazliAlperenDB'); if(savedDB) loveDB = JSON.parse(savedDB);
            if(!loveDB.places || loveDB.places.length === 0) { loveDB.places = defaultPlaces; saveDB(); }
            startNeverEndingTimer(); initLeafletMap(); renderGrids();
        }
        function saveDB() { localStorage.setItem('NazliAlperenDB', JSON.stringify(loveDB)); }

        function startNeverEndingTimer() {
            let startDateStr = localStorage.getItem('NazliAlperenStartDate');
            let startDate = startDateStr ? parseInt(startDateStr) : Date.now() - ((280*24+14)*60*60*1000);
            if(!startDateStr) localStorage.setItem('NazliAlperenStartDate', startDate.toString());
            setInterval(() => {
                let diff = Date.now() - startDate;
                document.getElementById('t-d').innerText = Math.floor(diff/(1000*60*60*24));
                document.getElementById('t-h').innerText = Math.floor((diff/(1000*60*60))%24).toString().padStart(2,'0');
                document.getElementById('t-m').innerText = Math.floor((diff/(1000*60))%60).toString().padStart(2,'0');
                document.getElementById('t-s').innerText = Math.floor((diff/1000)%60).toString().padStart(2,'0');
            }, 1000);
        }

        function switchTab(tabId, el) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            el.classList.add('active'); document.getElementById('tab-'+tabId).classList.add('active');
            if(tabId === 'map' && mapInstance) setTimeout(() => mapInstance.invalidateSize(), 100);
        }

        // İllüstrasyon / Atlas Tarzı Harita (Esri World Topo)
        function initLeafletMap() {
            if(mapInstance) return;
            mapInstance = L.map('map-container', { zoomControl: false, scrollWheelZoom: false, dragging: false, touchZoom: false, doubleClickZoom: false }).setView([38.2950, 26.3150], 11);
            
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { 
                attribution: 'Nazlı & Alperen', maxZoom: 19 
            }).addTo(mapInstance);
            
            drawMapElements();
            mapInstance.on('click', function(e) { openModal('map', e.latlng); });
        }

        async function drawMapElements() {
            if(!mapInstance || isDrawingMap) return; isDrawingMap = true;
            mapMarkers.clearLayers(); if(routeLayers) mapInstance.removeLayer(routeLayers); routeLayers = L.layerGroup();
            
            let pts = [...loveDB.places]; if(pts.length===0) { isDrawingMap = false; return; }
            const pinIcon = L.divIcon({ className: 'custom-pin', iconSize: [14,14], iconAnchor: [7,7] });

            loveDB.places.forEach((p, i) => {
                const marker = L.marker([p.lat, p.lng], { icon: pinIcon, draggable: true });
                
                // İsimler SADECE ÜZERİNE BASINCA / ÜZERİNE GELİNCE ÇIKAR
                marker.bindTooltip(`<b>${p.name}</b>`, {
                    permanent: false, // Sadece hover/click
                    direction: 'top',
                    offset: [0,-10],
                    className: 'custom-tooltip'
                });

                marker.bindPopup(`<div style="font-family:'Montserrat'; padding:5px; text-align:center;"><b style="color:#ff0055">${p.name}</b><br><button onclick="deletePlace(${i})" style="margin-top:5px; width:100%; padding:5px; background:rgba(255,0,85,0.1); border:1px solid #ff0055; color:#ff0055; border-radius:8px; cursor:pointer; font-weight:bold;">Sil</button></div>`);
                marker.on('dragend', function(e) { const pos = e.target.getLatLng(); loveDB.places[i].lat = pos.lat; loveDB.places[i].lng = pos.lng; saveDB(); drawMapElements(); });
                mapMarkers.addLayer(marker);
            });
            mapMarkers.addTo(mapInstance);

            if(pts.length < 2) { isDrawingMap = false; return; }

            let ordered = [pts[0]]; let remaining = pts.slice(1);
            while(remaining.length > 0) {
                let last = ordered[ordered.length-1], nIdx = 0, minDist = Infinity;
                for(let i=0; i<remaining.length; i++) {
                    let d = Math.hypot(last.lat-remaining[i].lat, last.lng-remaining[i].lng);
                    if(d<minDist) { minDist=d; nIdx=i; }
                }
                ordered.push(remaining.splice(nIdx,1)[0]);
            }

            let coordsStr = ordered.map(p => `${p.lng},${p.lat}`).join(';');
            try {
                let res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coordsStr}?geometries=geojson`);
                let data = await res.json();
                if(data.routes && data.routes[0]) {
                    let routeCoords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                    let polyAnim = L.polyline(routeCoords, { color: '#ff0055', weight: 3, opacity: 0.9, className: 'neon-route-thin' });
                    routeLayers.addLayer(polyAnim); routeLayers.addTo(mapInstance);
                } else fallbackDirectLine(ordered);
            } catch(e) { fallbackDirectLine(ordered); }
            isDrawingMap = false;
        }
        function fallbackDirectLine(o) { let ll = o.map(p => [p.lat, p.lng]); let pA = L.polyline(ll, { color: '#ff0055', weight: 3, opacity: 0.9, className: 'neon-route-thin' }); routeLayers.addLayer(pA); routeLayers.addTo(mapInstance); }
        window.deletePlace = function(i) { loveDB.places.splice(i, 1); saveDB(); drawMapElements(); mapInstance.closePopup(); };

        // Kartlar ve Düzenle/Sil
        function renderGrids() {
            const mGrid = document.getElementById('movie-grid'), nGrid = document.getElementById('note-grid');
            mGrid.innerHTML = ''; nGrid.innerHTML = '';

            if(loveDB.movies.length === 0) mGrid.innerHTML = '<div class="empty-text">Henüz film eklenmedi. Beraber izleyip buraya ekleyelim! 🍿</div>';
            else {
                for(let i = loveDB.movies.length - 1; i >= 0; i--) {
                    let m = loveDB.movies[i];
                    mGrid.innerHTML += `
                        <div class="data-card">
                            <div class="card-actions">
                                <div class="action-icon edit" onclick="openModal('movie', null, ${i})"><i class="fas fa-pen"></i></div>
                                <div class="action-icon delete" onclick="deleteItem('movie', ${i})"><i class="fas fa-trash"></i></div>
                            </div>
                            ${m.img ? `<img src="${m.img}">` : `<div class="no-img"><i class="fas fa-film"></i></div>`}
                            <div class="card-body"><div class="card-title">${m.title}</div>${m.desc ? `<div class="card-desc">${m.desc}</div>` : ''}</div>
                        </div>`;
                }
            }

            if(loveDB.notes.length === 0) nGrid.innerHTML = '<div class="empty-text">Buraya ilk anımızı, fotoğrafımızı veya notumuzu ekleyelim. 💌</div>';
            else {
                for(let i = loveDB.notes.length - 1; i >= 0; i--) {
                    let n = loveDB.notes[i];
                    nGrid.innerHTML += `
                        <div class="data-card note-card">
                            <div class="card-actions">
                                <div class="action-icon edit" onclick="openModal('note', null, ${i})"><i class="fas fa-pen"></i></div>
                                <div class="action-icon delete" onclick="deleteItem('note', ${i})"><i class="fas fa-trash"></i></div>
                            </div>
                            ${n.img ? `<img src="${n.img}">` : `<div class="no-img" style="color:#ffb3c6;"><i class="fas fa-heart"></i></div>`}
                            <div class="card-body"><div class="card-title">${n.title}</div>${n.desc ? `<div class="card-desc">${n.desc}</div>` : ''}<small style="display:block; margin-top:5px; color:var(--primary); font-size:0.7rem;">${n.date}</small></div>
                        </div>`;
                }
            }
        }

        window.deleteItem = function(type, index) {
            if(confirm("Silmek istediğine emin misin?")) {
                if(type === 'movie') loveDB.movies.splice(index, 1);
                if(type === 'note') loveDB.notes.splice(index, 1);
                saveDB(); renderGrids();
            }
        }

        const modalOverlay = document.getElementById('modal-overlay'), modalBox = document.getElementById('modal-box');
        let tempBase64 = null, tempLatLng = null, editMode = false, currentEditIndex = -1;

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                document.getElementById('upload-txt').innerText = "✅ Seçildi"; document.getElementById('upload-txt').style.color = "#00ff88";
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image(); img.onload = function() {
                        const canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 400; let scale = img.width > MAX_WIDTH ? MAX_WIDTH / img.width : 1;
                        canvas.width = img.width * scale; canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        tempBase64 = canvas.toDataURL('image/jpeg', 0.6);
                    }; img.src = event.target.result;
                }; reader.readAsDataURL(file);
            }
        });

        function openModal(type, latlng = null, editIdx = -1) {
            document.getElementById('modal-type').value = type;
            editMode = editIdx > -1; currentEditIndex = editIdx;
            tempBase64 = null; tempLatLng = latlng;
            
            if(editMode) {
                document.getElementById('modal-title').innerHTML = '<i class="fas fa-edit"></i> Düzenle';
                let item = type === 'movie' ? loveDB.movies[editIdx] : loveDB.notes[editIdx];
                document.getElementById('inp-title').value = item.title;
                document.getElementById('inp-desc').value = item.desc;
                tempBase64 = item.img || null;
                document.getElementById('upload-txt').innerText = tempBase64 ? "Fotoğraf Yüklü" : "Galeriden Seç";
            } else {
                document.getElementById('inp-title').value = ''; document.getElementById('inp-desc').value = ''; document.getElementById('file-input').value = '';
                document.getElementById('upload-txt').innerText = "Galeriden Seç";
            }
            
            if(type === 'map') {
                document.getElementById('modal-title').innerHTML = '<i class="fas fa-map-marker-alt"></i> Haritaya Yer Ekle';
                document.getElementById('lbl-title').innerText = "Mekanın Adı";
                document.getElementById('grp-desc').style.display = 'none'; document.getElementById('grp-img').style.display = 'none';
                if(!latlng) tempLatLng = { lat: 38.3230, lng: 26.3070 };
            } else {
                document.getElementById('grp-desc').style.display = 'block'; document.getElementById('grp-img').style.display = 'block';
            }
            modalOverlay.style.display = 'flex'; setTimeout(() => { modalOverlay.style.opacity = 1; modalBox.classList.add('show'); }, 10);
        }

        function closeModal() { modalOverlay.style.opacity = 0; modalBox.classList.remove('show'); setTimeout(() => modalOverlay.style.display = 'none', 300); }

        function saveData() {
            const type = document.getElementById('modal-type').value, title = document.getElementById('inp-title').value.trim(), desc = document.getElementById('inp-desc').value.trim();
            if(!title) { alert("Lütfen bir başlık gir!"); return; }

            if(editMode && currentEditIndex > -1) {
                if(type === 'movie') { loveDB.movies[currentEditIndex].title = title; loveDB.movies[currentEditIndex].desc = desc; if(tempBase64) loveDB.movies[currentEditIndex].img = tempBase64; }
                else if(type === 'note') { loveDB.notes[currentEditIndex].title = title; loveDB.notes[currentEditIndex].desc = desc; if(tempBase64) loveDB.notes[currentEditIndex].img = tempBase64; }
                renderGrids();
            } else {
                if(type === 'map') { loveDB.places.push({ name: title, lat: tempLatLng.lat, lng: tempLatLng.lng }); drawMapElements(); } 
                else if(type === 'movie') { loveDB.movies.push({ title: title, desc: desc, img: tempBase64 }); renderGrids(); } 
                else if(type === 'note') { loveDB.notes.push({ title: title, desc: desc, img: tempBase64, date: new Date().toLocaleDateString('tr-TR', {day:'numeric', month:'long', year:'numeric'}) }); renderGrids(); }
            }
            saveDB(); closeModal();
        }
    </script>
</body>
</html>
